<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceAttend — ระบบเช็คชื่อด้วยใบหน้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<style>
.bg-mesh{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(79,70,229,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(16,185,129,.1) 0%,transparent 50%)}
.floating-orb{position:fixed;border-radius:50%;filter:blur(80px);animation:float 8s ease-in-out infinite;z-index:0}
.orb-1{width:400px;height:400px;background:rgba(79,70,229,.12);top:-100px;left:-100px}
.orb-2{width:300px;height:300px;background:rgba(16,185,129,.1);bottom:-50px;right:-50px;animation-delay:3s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.login-container{position:relative;z-index:1;width:100%;max-width:460px;padding:20px}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;box-shadow:var(--shadow);animation:slideUp .6s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:40px}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;animation:pulse-glow 3s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(79,70,229,.4)}50%{box-shadow:0 0 40px rgba(79,70,229,.7)}}
.logo-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.logo-sub{color:var(--text-muted);font-size:14px;margin-top:4px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--bg-card2);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;font-size:15px;font-family:inherit;transition:all .2s;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;padding:15px;border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(79,70,229,.4)}
.btn-secondary{width:100%;background:var(--bg-card2);border:1px solid var(--border);color:var(--text);padding:13px;border-radius:12px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.btn-secondary:hover{border-color:var(--primary)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.demo-hint{text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px}
.demo-hint span{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:underline}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.error-box.show{display:block;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.version-tag{text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px;opacity:.5}
</style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden">
<div class="bg-mesh"></div>
<div class="floating-orb orb-1"></div>
<div class="floating-orb orb-2"></div>

<button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยน Theme" style="position:fixed;top:20px;right:20px;z-index:100">🌙</button>

<div class="login-container">
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-icon">🎓</div>
      <div class="logo-title">FaceAttend</div>
      <div class="logo-sub">ระบบเช็คชื่อนักเรียนด้วยใบหน้า</div>
    </div>

    <div class="error-box" id="errorMsg">⚠️ อีเมลหรือรหัสผ่านไม่ถูกต้อง</div>

    <div class="form-group">
      <label class="form-label">อีเมล</label>
      <input type="email" class="form-input" id="emailInput" placeholder="teacher@school.ac.th" value="admin@school.ac.th">
    </div>
    <div class="form-group">
      <label class="form-label">รหัสผ่าน</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" value="admin1234">
    </div>

    <button class="btn-primary" onclick="doLogin()"><span id="loginBtnText">🔐 เข้าสู่ระบบ</span></button>

    <div class="divider">หรือ</div>

    <button class="btn-secondary" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>

    <div class="demo-hint">
      ทดลองใช้: <span onclick="fillDemo('admin')">Admin</span> · <span onclick="fillDemo('teacher')">ครู</span> · <span onclick="fillDemo('viewer')">Viewer</span>
    </div>
    <div class="version-tag">FaceAttend v2.1.0 · face-api.js + Google Workspace</div>
  </div>
</div>

<script src="scripts/config.js"></script>
<script src="scripts/auth.js"></script>
</body>
</html>
