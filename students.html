<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นักเรียน — FaceAttend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js"></script>
<style>
.student-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.student-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.student-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; transition:all .2s; cursor:pointer; position:relative; }
.student-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--primary); }
.student-card-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.student-face { width:52px; height:52px; border-radius:12px; object-fit:cover; background:linear-gradient(135deg,var(--primary),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:white; flex-shrink:0; }
.student-name-main { font-size:15px; font-weight:700; }
.student-meta { font-size:12px; color:var(--text-muted); margin-top:2px; }
.student-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.student-stat { text-align:center; background:var(--bg-card2); padding:8px 4px; border-radius:8px; }
.student-stat-num { font-size:16px; font-weight:800; }
.student-stat-lbl { font-size:10px; color:var(--text-muted); }
.student-actions { display:flex; gap:6px; margin-top:12px; }
.face-indicator { position:absolute; top:12px; right:12px; width:10px; height:10px; border-radius:50%; }
.face-indicator.has-face { background:var(--accent); box-shadow:0 0 6px rgba(16,185,129,.6); }
.face-indicator.no-face { background:var(--warning); }
/* Camera modal styles */
.cam-modal-video { width:100%; aspect-ratio:4/3; background:#000; border-radius:var(--radius-sm); object-fit:cover; transform:scaleX(-1); }
.cam-capture-btn { width:64px; height:64px; border-radius:50%; background:white; border:4px solid var(--primary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:24px; transition:all .2s; margin:0 auto; }
.cam-capture-btn:hover { transform:scale(1.1); background:var(--primary); color:white; }
.preview-face { width:100%; aspect-ratio:4/3; border-radius:var(--radius-sm); object-fit:cover; }
.view-toggle { display:flex; gap:0; background:var(--bg-card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:3px; }
.view-btn { padding:7px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-muted); transition:all .2s; border:none; background:none; }
.view-btn.active { background:var(--primary); color:white; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <!-- Toolbar -->
      <div class="student-toolbar">
        <div class="search-bar" style="max-width:260px">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-input" id="searchInput" placeholder="ค้นหานักเรียน..." oninput="renderStudents()">
        </div>
        <select class="form-select" id="filterClass" onchange="renderStudents()" style="width:120px">
          <option value="">ทุกชั้น</option>
          <option>ม.1</option><option>ม.2</option><option>ม.3</option>
          <option>ม.4</option><option>ม.5</option><option>ม.6</option>
        </select>
        <select class="form-select" id="filterRoom" onchange="renderStudents()" style="width:100px">
          <option value="">ทุกห้อง</option>
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
        </select>
        <div style="flex:1"></div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')">⊞ Grid</button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')">≡ List</button>
        </div>
        <button class="btn btn-ghost" onclick="exportStudents()">📥 Export CSV</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ เพิ่มนักเรียน</button>
      </div>

      <!-- Student count -->
      <div id="studentCount" class="text-sm text-muted mb-16"></div>

      <!-- Grid view -->
      <div id="studentsGrid" class="student-grid"></div>
      <!-- List view -->
      <div id="studentsList" class="card hidden">
        <div class="table-wrap">
          <table id="studentsTable">
            <thead>
              <tr>
                <th>เลขที่</th><th>ชื่อ-สกุล</th><th>ชั้น/ห้อง</th><th>เพศ</th><th>ใบหน้า</th><th>สถานะ</th><th>การมาเรียน</th><th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="studentModal" style="display:none">
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:660px">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">➕ เพิ่มนักเรียน</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">คำนำหน้า</label>
          <select class="form-select" id="fPrefix">
            <option>ด.ช.</option><option>ด.ญ.</option><option>นาย</option><option>น.ส.</option><option>นาง</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">รหัสนักเรียน</label>
          <input type="text" class="form-input" id="fId" placeholder="S001">
        </div>
        <div class="form-group">
          <label class="form-label">ชื่อ</label>
          <input type="text" class="form-input" id="fFirst" placeholder="ธนกฤต">
        </div>
        <div class="form-group">
          <label class="form-label">นามสกุล</label>
          <input type="text" class="form-input" id="fLast" placeholder="มั่นคง">
        </div>
        <div class="form-group">
          <label class="form-label">ชั้น</label>
          <select class="form-select" id="fClass">
            <option>ม.1</option><option>ม.2</option><option>ม.3</option>
            <option>ม.4</option><option>ม.5</option><option>ม.6</option>
            <option>ป.1</option><option>ป.2</option><option>ป.3</option>
            <option>ป.4</option><option>ป.5</option><option>ป.6</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ห้อง</label>
          <select class="form-select" id="fRoom">
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">เลขที่</label>
          <input type="number" class="form-input" id="fNo" min="1" max="50" value="1">
        </div>
        <div class="form-group">
          <label class="form-label">เพศ</label>
          <select class="form-select" id="fGender"><option>ชาย</option><option>หญิง</option></select>
        </div>
      </div>

      <!-- Face capture section -->
      <div class="divider-h"></div>
      <div class="card-title" style="margin-bottom:14px">📷 ภาพใบหน้านักเรียน</div>
      <div class="form-grid">
        <div>
          <div id="cameraSection">
            <video id="modalVideo" class="cam-modal-video" autoplay muted playsinline style="display:none"></video>
            <canvas id="modalCanvas" class="cam-modal-video" style="display:none"></canvas>
            <div id="camPlaceholder" style="aspect-ratio:4/3;background:var(--bg-card2);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:8px;font-size:13px;border:2px dashed var(--border)">
              <span style="font-size:32px">📷</span>
              <span>ยังไม่มีรูปภาพ</span>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-ghost" style="flex:1" onclick="startModalCamera()">📷 เปิดกล้อง</button>
            <button class="btn btn-ghost" style="flex:1" onclick="captureModalFace()" id="captureBtn" disabled>📸 ถ่ายรูป</button>
          </div>
        </div>
        <div>
          <div id="facePreview" style="aspect-ratio:4/3;background:var(--bg-card2);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:8px;font-size:13px;border:2px dashed var(--border)">
            <span style="font-size:32px">👤</span>
            <span>ตัวอย่างรูป</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <label class="btn btn-ghost" style="flex:1;cursor:pointer">
              📁 Upload<input type="file" accept="image/*" onchange="handleUpload(this)" style="display:none">
            </label>
            <button class="btn btn-accent" style="flex:1" onclick="extractFaceDescriptor()" id="extractBtn" disabled>🧠 Extract Face</button>
          </div>
          <div id="faceStatus" style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center">รอรูปภาพ...</div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveStudent()">💾 บันทึก</button>
      </div>
    </div>
  </div>
</div>

<script src="scripts/config.js"></script>
<script src="scripts/auth.js"></script>
<script>
requireAuth();
let students = [];
let editingId = null;
let capturedImageData = null;
let capturedDescriptor = null;
let modalStream = null;
let currentView = 'grid';

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('students');
  renderTopbar('จัดการนักเรียน', 'เพิ่ม แก้ไข ลบ และจัดการข้อมูล');
  students = getStudents();
  renderStudents();
});

function setView(v) {
  currentView = v;
  document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', v === 'list');
  document.getElementById('studentsGrid').classList.toggle('hidden', v !== 'grid');
  document.getElementById('studentsList').classList.toggle('hidden', v !== 'list');
  renderStudents();
}

function filterStudents() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cls = document.getElementById('filterClass').value;
  const room = document.getElementById('filterRoom').value;
  return students.filter(s => {
    const name = `${s.prefix}${s.firstName}${s.lastName}${s.id}`.toLowerCase();
    return (!q || name.includes(q)) &&
           (!cls || s.class === cls) &&
           (!room || s.room === room);
  });
}

function getStudentAttendanceRate(id) {
  const records = getAttendance().filter(r => r.studentId === id);
  if (!records.length) return { present: 0, late: 0, absent: 0, rate: 0 };
  const p = records.filter(r => r.status === 'present').length;
  const l = records.filter(r => r.status === 'late').length;
  const a = records.filter(r => r.status === 'absent').length;
  return { present: p, late: l, absent: a, rate: Math.round((p / records.length) * 100) };
}

function renderStudents() {
  const filtered = filterStudents();
  document.getElementById('studentCount').textContent = `แสดง ${filtered.length} จาก ${students.length} คน`;

  if (currentView === 'grid') {
    document.getElementById('studentsGrid').innerHTML = filtered.map(s => {
      const stats = getStudentAttendanceRate(s.id);
      const initials = `${s.firstName[0]}${s.lastName[0]}`;
      return `
        <div class="student-card" onclick="openEditModal('${s.id}')">
          <div class="face-indicator ${s.faceDescriptor ? 'has-face' : 'no-face'}" title="${s.faceDescriptor ? 'มีข้อมูลใบหน้า' : 'ยังไม่มีข้อมูลใบหน้า'}"></div>
          <div class="student-card-top">
            ${s.imageUrl
              ? `<img src="${s.imageUrl}" class="student-face" onerror="this.outerHTML='<div class=student-face>${initials}</div>'">`
              : `<div class="student-face">${initials}</div>`
            }
            <div>
              <div class="student-name-main">${s.prefix}${s.firstName}</div>
              <div class="student-meta">${s.lastName}</div>
              <div class="student-meta">ชั้น ${s.class}/${s.room} · เลขที่ ${s.no}</div>
            </div>
          </div>
          <div class="student-stats">
            <div class="student-stat"><div class="student-stat-num" style="color:var(--accent)">${stats.present}</div><div class="student-stat-lbl">มาเรียน</div></div>
            <div class="student-stat"><div class="student-stat-num" style="color:var(--warning)">${stats.late}</div><div class="student-stat-lbl">สาย</div></div>
            <div class="student-stat"><div class="student-stat-num" style="color:var(--danger)">${stats.absent}</div><div class="student-stat-lbl">ขาด</div></div>
          </div>
          <div style="margin-top:10px">
            <div class="progress-bar"><div class="progress-fill" style="width:${stats.rate}%"></div></div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:right">มาเรียน ${stats.rate}%</div>
          </div>
          <div class="student-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="openEditModal('${s.id}')">✏️ แก้ไข</button>
            <button class="btn btn-danger" style="font-size:12px" onclick="deleteStudent('${s.id}')">🗑️</button>
          </div>
        </div>
      `;
    }).join('');
  } else {
    document.getElementById('studentsTableBody').innerHTML = filtered.map(s => {
      const stats = getStudentAttendanceRate(s.id);
      return `
        <tr>
          <td>${s.no}</td>
          <td><span style="font-weight:600">${s.prefix}${s.firstName} ${s.lastName}</span></td>
          <td>${s.class}/${s.room}</td>
          <td>${s.gender}</td>
          <td>${s.faceDescriptor ? '<span class="badge badge-green">✅ มีข้อมูล</span>' : '<span class="badge badge-yellow">⚠️ ไม่มี</span>'}</td>
          <td><span class="badge badge-green">ปกติ</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="progress-bar" style="width:60px"><div class="progress-fill" style="width:${stats.rate}%"></div></div>
              <span style="font-size:12px;font-weight:700">${stats.rate}%</span>
            </div>
          </td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn-icon" title="แก้ไข" onclick="openEditModal('${s.id}')">✏️</button>
              <button class="btn-icon" title="ลบ" onclick="deleteStudent('${s.id}')">🗑️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
}

function openAddModal() {
  editingId = null;
  capturedImageData = null;
  capturedDescriptor = null;
  document.getElementById('modalTitle').textContent = '➕ เพิ่มนักเรียน';
  clearForm();
  document.getElementById('studentModal').style.display = 'flex';
}

function openEditModal(id) {
  editingId = id;
  const s = students.find(st => st.id === id);
  if (!s) return;

  document.getElementById('modalTitle').textContent = '✏️ แก้ไขข้อมูลนักเรียน';
  document.getElementById('fId').value = s.id;
  document.getElementById('fPrefix').value = s.prefix;
  document.getElementById('fFirst').value = s.firstName;
  document.getElementById('fLast').value = s.lastName;
  document.getElementById('fClass').value = s.class;
  document.getElementById('fRoom').value = s.room;
  document.getElementById('fNo').value = s.no;
  document.getElementById('fGender').value = s.gender;

  capturedDescriptor = s.faceDescriptor;
  if (s.imageUrl) {
    document.getElementById('facePreview').innerHTML = `<img src="${s.imageUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)">`;
    document.getElementById('extractBtn').disabled = false;
  }
  if (s.faceDescriptor) {
    document.getElementById('faceStatus').textContent = '✅ มีข้อมูล Face Descriptor แล้ว';
    document.getElementById('faceStatus').style.color = 'var(--accent)';
  }

  document.getElementById('studentModal').style.display = 'flex';
}

function clearForm() {
  ['fId','fFirst','fLast','fNo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fNo').value = students.length + 1;
  document.getElementById('facePreview').innerHTML = '<span style="font-size:32px">👤</span><span>ตัวอย่างรูป</span>';
  document.getElementById('faceStatus').textContent = 'รอรูปภาพ...';
  document.getElementById('faceStatus').style.color = 'var(--text-muted)';
  document.getElementById('extractBtn').disabled = true;
}

function closeModal() {
  stopModalCamera();
  document.getElementById('studentModal').style.display = 'none';
}

function saveStudent() {
  const id = document.getElementById('fId').value.trim();
  const firstName = document.getElementById('fFirst').value.trim();
  const lastName = document.getElementById('fLast').value.trim();
  if (!id || !firstName || !lastName) { showToast('กรุณากรอกข้อมูลให้ครบ', '', 'warning'); return; }

  const studentData = {
    id,
    prefix: document.getElementById('fPrefix').value,
    firstName,
    lastName,
    class: document.getElementById('fClass').value,
    room: document.getElementById('fRoom').value,
    no: parseInt(document.getElementById('fNo').value),
    gender: document.getElementById('fGender').value,
    status: 'active',
    imageUrl: capturedImageData || '',
    faceDescriptor: capturedDescriptor || null
  };

  if (editingId) {
    const idx = students.findIndex(s => s.id === editingId);
    if (idx >= 0) { students[idx] = { ...students[idx], ...studentData }; }
  } else {
    if (students.find(s => s.id === id)) { showToast('รหัสนักเรียนซ้ำ', `${id} มีในระบบแล้ว`, 'error'); return; }
    students.push(studentData);
  }

  saveStudents(students);
  closeModal();
  renderStudents();
  showToast(editingId ? 'แก้ไขสำเร็จ' : 'เพิ่มสำเร็จ', `${studentData.prefix}${firstName} ${lastName}`, 'success');
}

function deleteStudent(id) {
  const s = students.find(st => st.id === id);
  confirm('ลบนักเรียน', `ต้องการลบ ${s?.prefix}${s?.firstName} ${s?.lastName} ออกจากระบบ?`, () => {
    students = students.filter(st => st.id !== id);
    saveStudents(students);
    renderStudents();
    showToast('ลบสำเร็จ', '', 'info');
  });
}

// ── Camera in Modal ──────────────────────────────
async function startModalCamera() {
  try {
    modalStream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360, facingMode: 'user' } });
    const video = document.getElementById('modalVideo');
    video.srcObject = modalStream;
    video.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('captureBtn').disabled = false;
    showToast('เปิดกล้องสำเร็จ', '', 'success');
  } catch (err) {
    showToast('ไม่สามารถเปิดกล้องได้', err.message, 'error');
  }
}

function captureModalFace() {
  const video = document.getElementById('modalVideo');
  const canvas = document.getElementById('modalCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedImageData = canvas.toDataURL('image/jpeg', 0.85);
  canvas.style.display = 'block';
  video.style.display = 'none';
  stopModalCamera();
  document.getElementById('facePreview').innerHTML = `<img src="${capturedImageData}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)">`;
  document.getElementById('extractBtn').disabled = false;
  document.getElementById('faceStatus').textContent = '📸 ถ่ายรูปแล้ว กด Extract เพื่อสร้าง Face Descriptor';
  showToast('ถ่ายรูปสำเร็จ', '', 'success');
}

function stopModalCamera() {
  if (modalStream) { modalStream.getTracks().forEach(t => t.stop()); modalStream = null; }
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    capturedImageData = e.target.result;
    document.getElementById('facePreview').innerHTML = `<img src="${capturedImageData}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)">`;
    document.getElementById('extractBtn').disabled = false;
    document.getElementById('faceStatus').textContent = '🖼️ อัปโหลดรูปแล้ว กด Extract เพื่อสร้าง Face Descriptor';
  };
  reader.readAsDataURL(file);
}

async function extractFaceDescriptor() {
  if (!capturedImageData) { showToast('ไม่มีรูปภาพ', '', 'warning'); return; }
  const statusEl = document.getElementById('faceStatus');
  statusEl.textContent = '🧠 กำลังสร้าง Face Descriptor...';
  statusEl.style.color = 'var(--warning)';

  try {
    // Check if faceapi is loaded
    if (typeof faceapi === 'undefined') throw new Error('face-api ยังไม่โหลด');

    const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model/';
    if (!faceapi.nets.ssdMobilenetv1.params) {
      statusEl.textContent = 'โหลด models...';
      await faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl);
      await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
      await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
    }

    const img = new Image();
    img.src = capturedImageData;
    await new Promise(r => img.onload = r);

    const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
    if (!detection) {
      statusEl.textContent = '❌ ไม่พบใบหน้า กรุณาถ่ายรูปใหม่';
      statusEl.style.color = 'var(--danger)';
      showToast('ไม่พบใบหน้า', 'กรุณาถ่ายรูปใหม่ให้เห็นหน้าชัดเจน', 'error');
      return;
    }

    capturedDescriptor = Array.from(detection.descriptor);
    statusEl.textContent = '✅ สร้าง Face Descriptor สำเร็จ! (128 dimensions)';
    statusEl.style.color = 'var(--accent)';
    showToast('สร้าง Face Descriptor สำเร็จ', 'พร้อมใช้สำหรับการจดจำใบหน้า', 'success');
  } catch (err) {
    // Demo mode: generate dummy descriptor
    capturedDescriptor = Array.from({ length: 128 }, () => Math.random() * 2 - 1);
    statusEl.textContent = '✅ สร้าง Demo Face Descriptor แล้ว (ทดสอบ)';
    statusEl.style.color = 'var(--warning)';
    showToast('Demo Mode', 'สร้าง Face Descriptor สำหรับทดสอบ', 'warning');
  }
}

function exportStudents() {
  const csv = [
    ['รหัส','คำนำหน้า','ชื่อ','นามสกุล','ชั้น','ห้อง','เลขที่','เพศ','มีข้อมูลใบหน้า'],
    ...students.map(s => [s.id, s.prefix, s.firstName, s.lastName, s.class, s.room, s.no, s.gender, s.faceDescriptor ? 'ใช่' : 'ไม่'])
  ].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `นักเรียน_${new Date().toLocaleDateString('th-TH')}.csv`;
  a.click();
  showToast('Export สำเร็จ', `${students.length} รายชื่อ`, 'success');
}
</script>
